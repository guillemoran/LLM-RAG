<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RAG · Chat con el documento</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: #0d0d0d;
        }

        .card {
            background: #1a1a1a;
            border: 1px solid #2e2e2e;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            padding: 32px;
            width: 100%;
            max-width: 560px;
            display: flex;
            flex-direction: column;
            height: 80vh;
        }

        h1 {
            font-size: 1.5rem;
            color: #ffd400;
            margin-bottom: 4px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #8a8a8a;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        
        .chat {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 8px;
            margin-bottom: 16px;
        }

        .empty-hint {
            margin: auto;
            color: #555;
            font-size: 0.95rem;
            text-align: center;
        }

        
        .bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 1rem;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .bubble.user {
            align-self: flex-end;
            background: #ffd400;
            color: #0d0d0d;
            border-bottom-right-radius: 4px;
        }
        .bubble.bot {
            align-self: flex-start;
            background: #2a2a2a;
            color: #f5f5f5;
            border: 1px solid #3a3a3a;
            border-bottom-left-radius: 4px;
        }
        .bubble.bot.loading { color: #ffd400; }

        
        .name-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #3a3a3a;
            border-radius: 12px;
            font-size: 0.95rem;
            outline: none;
            margin-bottom: 10px;
            background: #0d0d0d;
            color: #f5f5f5;
            transition: border-color 0.2s;
        }
        .name-input::placeholder { color: #6a6a6a; }
        .name-input:focus { border-color: #ffd400; }
        .name-input.error { border-color: #ff5c5c; background: #2a1414; }

        .input-row { display: flex; gap: 10px; }

        input#question {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #3a3a3a;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            background: #0d0d0d;
            color: #f5f5f5;
            transition: border-color 0.2s;
        }
        input#question::placeholder { color: #6a6a6a; }
        input#question:focus { border-color: #ffd400; }

        button {
            padding: 12px 22px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            color: #0d0d0d;
            cursor: pointer;
            background: #ffd400;
            transition: transform 0.15s, background 0.2s;
        }
        button:hover { transform: translateY(-2px); background: #ffe04d; }
        button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔮 Chat con el documento</h1>

        <div id="chat" class="chat">
            <div id="emptyHint" class="empty-hint">Hacé tu primera pregunta para empezar ✨</div>
        </div>

        <input
            id="userName"
            class="name-input"
            type="text"
            placeholder="Nombre de Usuario"
            autocomplete="off"
        />

        <div class="input-row">
            <input
                id="question"
                type="text"
                placeholder="Ej: ¿Quién es Zara?"
                autocomplete="off"
            />
            <button id="askBtn" onclick="ask()">Enviar</button>
        </div>
    </div>

    <script>
        const input = document.getElementById("question");
        const button = document.getElementById("askBtn");
        const chat = document.getElementById("chat");
        const nameInput = document.getElementById("userName");
        const emptyHint = document.getElementById("emptyHint");


        function addBubble(text, who) {
            if (emptyHint) emptyHint.remove();
            const bubble = document.createElement("div");
            bubble.className = "bubble " + who;
            bubble.textContent = text;
            chat.appendChild(bubble);
            chat.scrollTop = chat.scrollHeight; 
            return bubble;
        }

        async function ask() {
            const question = input.value.trim();
            const userName = nameInput.value.trim();

            if (!userName) {
                nameInput.classList.add("error");
                nameInput.focus();
                return;
            }
            nameInput.classList.remove("error");
            if (!question) return;


            addBubble(question, "user");
            input.value = "";


            const thinking = addBubble("Pensando… 🤔", "bot");
            thinking.classList.add("loading");
            button.disabled = true;

            try {
                const response = await fetch("/ask", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        user_name: userName,
                        question: question
                    })
                });

                if (!response.ok) {
                    throw new Error("La API respondió con error " + response.status);
                }

                const data = await response.json();
                thinking.classList.remove("loading");
                thinking.textContent = data.answer;
            } catch (error) {
                thinking.classList.remove("loading");
                thinking.textContent = "Ups, algo falló: " + error.message;
            } finally {
                button.disabled = false;
                chat.scrollTop = chat.scrollHeight;
            }
        }

        input.addEventListener("keydown", function (event) {
            if (event.key === "Enter") ask();
        });
    </script>
</body>
</html>
